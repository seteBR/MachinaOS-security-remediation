# Release workflow - predeploy gate, publish, GitHub release, then test install

name: Release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

# Top-level permissions for all jobs (jobs can narrow further)
permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  predeploy:
    uses: ./.github/workflows/predeploy.yml

  # Audit production dependencies before publishing
  audit:
    name: Security Audit
    needs: predeploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Audit production dependencies
        run: pnpm audit --prod || true

  # Build client once after predeploy passes, share with publish jobs
  build-for-publish:
    name: Build for Publishing
    needs: [predeploy, audit]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Install and build client
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter react-flow-client run build

      - name: Upload built client
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist
          retention-days: 1

  publish-npm:
    name: Publish to npm (with provenance)
    needs: build-for-publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Download built client
        uses: actions/download-artifact@v4
        with:
          name: client-dist
          path: client/dist

      - name: Install dependencies (skip scripts)
        run: npm install --ignore-scripts

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Sync versions from git tag
        run: python -m machina version sync

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Publish to npm with provenance
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-github-packages:
    name: Publish to GitHub Packages
    needs: build-for-publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'

      - name: Download built client
        uses: actions/download-artifact@v4
        with:
          name: client-dist
          path: client/dist

      - name: Install dependencies (skip scripts)
        run: npm install --ignore-scripts

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Sync versions from git tag
        run: python -m machina version sync

      - name: Configure scoped package
        run: |
          node -e "
            const pkg = require('./package.json');
            pkg.name = '@zeenie-ai/machinaos';
            pkg.publishConfig = { registry: 'https://npm.pkg.github.com' };
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Create GitHub Release with auto-generated notes
  create-github-release:
    name: Create GitHub Release
    needs: [publish-npm, publish-github-packages]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "MachinaOS ${{ steps.version.outputs.version }}" \
            --generate-notes \
            --verify-tag

  # Test user installation after publishing
  test-install:
    needs: [create-github-release]
    uses: ./.github/workflows/test-install.yml
