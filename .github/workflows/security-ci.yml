name: Security CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm install --frozen-lockfile
      - name: pnpm production audit
        run: pnpm audit --prod
      - name: server npm audit
        run: npm audit --omit=dev --prefix server
      - name: Python dependency audit
        run: uvx pip-audit -r server/requirements.txt

  security-regression:
    name: Security regression tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm install --frozen-lockfile
      - name: Build Node executor
        run: pnpm --filter machinaos-nodejs-executor run build
      - name: Focused backend security tests
        run: uv run --project server pytest server/tests/test_webhook_security.py server/tests/test_trigger_listener_workflow.py server/tests/nodes/test_code_fs_process.py::TestPythonExecutor -q
      - name: CLI safe-bind tests
        run: uv run --with typer --with rich --with anyio --with psutil --with platformdirs --with pytest python -m pytest cli/tests/test_start.py cli/tests/test_dev.py -q

  hygiene:
    name: Repository hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check whitespace
        run: git diff --check
